# This workflow builds and pushes a new container image to Amazon ECR,
# then deploys it to Amazon ECS. Run it manually from the Actions tab (workflow_dispatch).
#
# Branch selection:
# - "Use workflow from" (GitHub UI): which branch supplies this workflow file and default checkout ref.
# - "Branch / tag / SHA to build" (input below): optional. Leave blank to build the same ref as above;
#   set it to build a different branch, tag, or commit while still running the workflow YAML from the UI branch.
#
# To use this workflow, you will need to complete the following set-up steps:
#
# 1. Create an ECR repository to store your images.
#    For example: `aws ecr create-repository --repository-name my-ecr-repo --region us-east-2`.
#    Replace the value of the `ECR_REPOSITORY` environment variable in the workflow below with your repository's name.
#    Replace the value of the `AWS_REGION` environment variable in the workflow below with your repository's region.
#
# 2. Store an IAM user access key in GitHub Actions secrets named `AWS_ACCESS_KEY_ID` and `AWS_SECRET_ACCESS_KEY`.
#
# 3. Configure GitHub Actions variables for ECS (repository / environment variables):
#    - ECS_CLUSTER: ECS cluster name
#    - ECS_SERVICE: ECS service name
#    - ECS_TASK_DEFINITION: existing task definition family name (e.g. my-app)
#    - ECS_CONTAINER_NAME: container name inside that task definition whose image should be updated

name: ECR build and ECS deploy

on:
  workflow_dispatch:
    inputs:
      build_ref:
        description: >-
          Branch, tag, or SHA to check out and build (e.g. develop, v1.2.3, or a full 40-char commit).
          Leave blank to build the branch chosen in "Use workflow from" above.
        required: false
        type: string
        default: ""

env:
  AWS_REGION: ${{ vars.AWS_REGION }}         # set this to your preferred AWS region, e.g. us-west-1
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }} # set this to your Amazon ECR repository name

permissions:
  contents: read

jobs:
  push:
    name: Push
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image: ${{ steps.image-uri.outputs.image }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.build_ref != '' && inputs.build_ref || github.ref }}

    - name: Resolve image tag from checked-out commit
      id: build-meta
      run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ steps.build-meta.outputs.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    - name: Export image URI for ECS deploy
      id: image-uri
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ steps.build-meta.outputs.sha }}
      run: |
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ECS
    needs: push
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Download current ECS task definition
      run: |
        aws ecs describe-task-definition \
          --task-definition "${{ vars.ECS_TASK_DEFINITION }}" \
          --query taskDefinition \
          --output json | jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > task-definition.json

    - name: Render task definition with new image
      id: render-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ vars.ECS_CONTAINER_NAME }}
        image: ${{ needs.push.outputs.image }}

    - name: Deploy to Amazon ECS
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.render-task-def.outputs.task-definition }}
        service: ${{ vars.ECS_SERVICE }}
        cluster: ${{ vars.ECS_CLUSTER }}
        wait-for-service-stability: true
